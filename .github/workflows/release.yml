name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz

          - platform: macos-latest
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-arm64.tgz

          - platform: ubuntu-22.04
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download pdfium (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/bin src-tauri/lib
          curl -L "${{ matrix.pdfium-url }}" -o pdfium.tgz
          tar -xzf pdfium.tgz
          cp bin/pdfium.dll src-tauri/bin/pdfium.dll
          # linker needs pdfium.lib (the import library)
          cp lib/pdfium.dll.lib src-tauri/lib/pdfium.lib

      - name: Download pdfium (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/bin src-tauri/lib
          curl -L "${{ matrix.pdfium-url }}" -o pdfium.tgz
          tar -xzf pdfium.tgz
          cp lib/libpdfium.dylib src-tauri/bin/libpdfium.dylib
          cp lib/libpdfium.dylib src-tauri/lib/libpdfium.dylib

      - name: Download pdfium (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p src-tauri/bin src-tauri/lib
          curl -L "${{ matrix.pdfium-url }}" -o pdfium.tgz
          tar -xzf pdfium.tgz
          cp lib/libpdfium.so src-tauri/bin/libpdfium.so
          cp lib/libpdfium.so src-tauri/lib/libpdfium.so

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Reader ${{ github.ref_name }}
          releaseBody: |
            Download the installer for your platform below.

            **Windows** (x64): `PDF Reader_x64_en-US.msi` or `PDF Reader_x64-setup.exe`
            **macOS** (Apple Silicon): `PDF Reader_aarch64.dmg`
            **Linux** (x64): `PDF Reader_amd64.AppImage` or `PDF Reader_amd64.deb`
          releaseDraft: false
          prerelease: false
