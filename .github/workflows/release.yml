name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz
            pdfium-lib: pdfium.dll
            pdfium-bin: src-tauri/bin/pdfium.dll

          - platform: macos-13
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-x64.tgz
            pdfium-lib: libpdfium.dylib
            pdfium-bin: src-tauri/bin/libpdfium.dylib

          - platform: macos-latest
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-arm64.tgz
            pdfium-lib: libpdfium.dylib
            pdfium-bin: src-tauri/bin/libpdfium.dylib

          - platform: ubuntu-22.04
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz
            pdfium-lib: libpdfium.so
            pdfium-bin: src-tauri/bin/libpdfium.so

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download pdfium
        shell: bash
        run: |
          mkdir -p src-tauri/bin src-tauri/lib
          curl -L "${{ matrix.pdfium-url }}" -o pdfium.tgz
          tar -xzf pdfium.tgz
          # pdfium-binaries extracts to lib/libpdfium.* or lib/pdfium.dll
          LIB=$(find . -name "${{ matrix.pdfium-lib }}" ! -path "./${{ matrix.pdfium-bin }}" | head -1)
          cp "$LIB" "${{ matrix.pdfium-bin }}"
          # also place in src-tauri/lib/ so the linker can find it by name
          cp "$LIB" "src-tauri/lib/${{ matrix.pdfium-lib }}"

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Reader ${{ github.ref_name }}
          releaseBody: |
            Download the installer for your platform below.

            **Windows** (x64): `Reader_x64_en-US.msi` or `Reader_x64-setup.exe`
            **macOS** (Apple Silicon): `Reader_aarch64.dmg`
            **macOS** (Intel): `Reader_x64.dmg`
            **Linux** (x64): `Reader_amd64.AppImage` or `Reader_amd64.deb`
          releaseDraft: false
          prerelease: false
