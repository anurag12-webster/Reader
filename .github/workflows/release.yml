name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz

          - platform: ubuntu-22.04
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download pdfium (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/bin src-tauri/lib
          curl -L "${{ matrix.pdfium-url }}" -o pdfium.tgz
          tar -xzf pdfium.tgz
          cp bin/pdfium.dll src-tauri/bin/pdfium.dll
          cp lib/pdfium.dll.lib src-tauri/lib/pdfium.lib

      - name: Download pdfium (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p src-tauri/bin src-tauri/lib
          curl -L "${{ matrix.pdfium-url }}" -o pdfium.tgz
          tar -xzf pdfium.tgz
          cp lib/libpdfium.so src-tauri/bin/libpdfium.so
          cp lib/libpdfium.so src-tauri/lib/libpdfium.so

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Reader ${{ github.ref_name }}
          releaseBody: |
            ## What's new

            - **Settings page** — dedicated tab with Reading, Library, Updates, Privacy, and Shortcuts panels
            - **Reading defaults** — set your preferred zoom, theme, and layout; applied to all open files instantly
            - **Continuous scroll** — new layout mode for infinite vertical scrolling through all pages
            - **Smooth zoom** — Ctrl+scroll zoom is now smooth with CSS scaling during gesture, single re-render on settle
            - **Thumbnails toggle** — disable library thumbnails for better performance on slower machines
            - **Auto-update check** — check for new versions from Settings → Updates
            - **Bug fix** — window dragging now works reliably on all platforms
            - **Bug fix** — app freezes fixed by moving PDF rendering off the main async thread
            - **Bug fix** — artifact/link extraction now works on Linux
            - **Bug fix** — outline navigation works correctly in continuous scroll mode

            ## Downloads

            **Windows** (x64): `PDF Reader_x64_en-US.msi` or `PDF Reader_x64-setup.exe`
            **Linux** (x64): `PDF Reader_amd64.AppImage` or `PDF Reader_amd64.deb`
          releaseDraft: false
          prerelease: false
