name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz
            pdfium-lib: pdfium.dll
            pdfium-dest: src-tauri/bin/pdfium.dll

          - platform: macos-latest
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-x64.tgz
            pdfium-lib: libpdfium.dylib
            pdfium-dest: src-tauri/bin/libpdfium.dylib

          - platform: ubuntu-22.04
            pdfium-url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz
            pdfium-lib: libpdfium.so
            pdfium-dest: src-tauri/bin/libpdfium.so

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download pdfium
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          curl -L "${{ matrix.pdfium-url }}" -o pdfium.tgz
          tar -xzf pdfium.tgz
          # find the lib inside the extracted archive
          find . -name "${{ matrix.pdfium-lib }}" | head -1 | xargs -I{} cp {} ${{ matrix.pdfium-dest }}

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Reader ${{ github.ref_name }}
          releaseBody: |
            Download the installer for your platform below.

            **Windows**: `.msi` (recommended) or `.exe`
            **macOS**: `.dmg`
            **Linux**: `.AppImage` or `.deb`
          releaseDraft: false
          prerelease: false
